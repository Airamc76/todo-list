<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tareas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap');

  :root {
    /* color */
    --paper:        #faf6ee;
    --paper-edge:   #f1ebdc;
    --rule:         #e6dfcc;
    --ink:          #2b241c;
    --ink-soft:     #6b5f4f;
    --ink-faint:    #a89c87;
    --accent:       #b8472d;          /* tinta roja */
    --accent-soft:  #b8472d22;
    --shadow:       0 1px 0 #f1ebdc, 0 20px 40px -28px rgba(43,36,28,.35), 0 4px 16px -10px rgba(43,36,28,.2);

    /* spacing */
    --s-1: 4px;
    --s-2: 8px;
    --s-3: 12px;
    --s-4: 16px;
    --s-5: 24px;
    --s-6: 32px;
    --s-7: 48px;

    /* radius */
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;

    /* type */
    --display: 'Caveat', ui-serif, Georgia, serif;
    --body:    'Newsreader', ui-serif, Georgia, serif;

    /* motion */
    --ease-out: cubic-bezier(.22,.61,.36,1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #efe8d6;
    color: var(--ink);
    font-family: var(--body);
    font-size: 17px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* subtle paper grain on the page bg */
  body {
    min-height: 100dvh;
    background-image:
      radial-gradient(circle at 20% 10%, #f4ecd6 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, #ebe2c8 0%, transparent 45%),
      linear-gradient(#efe8d6, #efe8d6);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: clamp(0px, 5vw, 40px);
  }

  .app {
    width: 100%;
    max-width: 480px;
    background: var(--paper);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
    min-height: 100dvh;
  }
  @media (min-width: 600px) {
    .app {
      min-height: 0;
      margin: clamp(0px, 4vh, 48px) 0;
    }
  }

  /* the "binding" rule down the left edge — notepad detail */
  .app::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    left: 38px;
    width: 1px;
    background: var(--accent);
    opacity: .25;
    pointer-events: none;
  }
  @media (max-width: 480px) {
    .app::before { left: 28px; }
  }

  /* === Header / sticky === */
  header {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--paper);
    padding: var(--s-6) var(--s-6) var(--s-3);
    border-bottom: 1px solid transparent;
    transition: border-color .2s var(--ease-out), box-shadow .2s var(--ease-out);
  }
  header.is-stuck {
    border-bottom-color: var(--rule);
    box-shadow: 0 8px 20px -20px rgba(43,36,28,.4);
  }
  @media (max-width: 480px) {
    header { padding: var(--s-5) var(--s-4) var(--s-3); }
  }

  .title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--s-4);
    margin-bottom: var(--s-4);
  }
  h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 44px;
    line-height: 1;
    margin: 0;
    letter-spacing: -.5px;
  }
  h1 .dot { color: var(--accent); }

  .counter {
    font-size: 13px;
    color: var(--ink-soft);
    font-feature-settings: "tnum" 1;
    white-space: nowrap;
  }
  .counter strong {
    color: var(--ink);
    font-weight: 600;
  }

  /* === Input row === */
  .input-row {
    display: flex;
    align-items: center;
    gap: var(--s-2);
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: var(--s-2) var(--s-2) var(--s-2) var(--s-4);
    transition: border-color .15s var(--ease-out), box-shadow .15s var(--ease-out);
  }
  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .input-row input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font: inherit;
    font-size: 16px;
    color: var(--ink);
    padding: 6px 0;
    min-width: 0;
  }
  .input-row input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }
  .add-btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    font: 600 14px/1 var(--body);
    padding: 10px 16px;
    border-radius: var(--r-sm);
    transition: transform .08s var(--ease-out), background .15s var(--ease-out), opacity .15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #a13d27; }
  .add-btn:active { transform: scale(.96); }
  .add-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* === Filters === */
  .filters {
    display: flex;
    gap: 2px;
    margin-top: var(--s-4);
    padding: 3px;
    background: var(--paper-edge);
    border-radius: var(--r-sm);
    width: fit-content;
  }
  .filter {
    appearance: none;
    border: 0;
    background: transparent;
    cursor: pointer;
    font: 500 13px/1 var(--body);
    color: var(--ink-soft);
    padding: 7px 14px;
    border-radius: 4px;
    transition: background .15s, color .15s;
  }
  .filter:hover { color: var(--ink); }
  .filter[aria-pressed="true"] {
    background: var(--paper);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(43,36,28,.08);
  }

  /* === List === */
  .list-wrap {
    padding: var(--s-3) var(--s-4) var(--s-6) var(--s-6);
  }
  @media (max-width: 480px) {
    .list-wrap { padding: var(--s-3) var(--s-3) var(--s-6) var(--s-5); }
  }
  ul.tasks {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  li.task {
    display: flex;
    align-items: flex-start;
    gap: var(--s-3);
    padding: 12px var(--s-3) 12px var(--s-2);
    border-bottom: 1px solid var(--rule);
    position: relative;
    transition:
      background .15s var(--ease-out),
      padding-left .25s var(--ease-out),
      opacity .3s var(--ease-out);

    /* slide-in on add */
    animation: slideIn .35s var(--ease-out) both;
  }
  li.task:last-child { border-bottom: 0; }
  li.task:hover { background: #fbf8f0; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* leaving (delete) */
  li.task.leaving {
    animation: slideOut .25s var(--ease-out) forwards;
    pointer-events: none;
  }
  @keyframes slideOut {
    to {
      opacity: 0;
      transform: translateX(40px);
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      margin-bottom: 0;
      border-color: transparent;
    }
  }

  /* checkbox */
  .check {
    flex: none;
    appearance: none;
    width: 22px;
    height: 22px;
    margin: 2px 0 0;
    border: 1.5px solid var(--ink-soft);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: border-color .15s, background .15s, transform .15s var(--ease-out);
  }
  .check:hover { border-color: var(--accent); }
  .check:checked {
    border-color: var(--accent);
    background: var(--accent);
    animation: pop .35s var(--ease-out);
  }
  .check:checked::after {
    content: "";
    position: absolute;
    left: 5px; top: 9px;
    width: 9px; height: 4px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg);
    transform-origin: left center;
    animation: drawCheck .25s var(--ease-out) both;
  }
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  @keyframes drawCheck {
    from { width: 0; opacity: 0; }
    to   { width: 9px; opacity: 1; }
  }

  .label {
    flex: 1;
    font-size: 16.5px;
    color: var(--ink);
    word-break: break-word;
    cursor: pointer;
    user-select: none;
    padding-top: 1px;
    position: relative;
    transition: color .3s var(--ease-out);
  }

  /* the strike line — drawn as a pseudo-element so we can animate it */
  .label::after {
    content: "";
    position: absolute;
    top: 50%;
    left: -2px;
    width: 0;
    height: 1.5px;
    background: var(--ink-soft);
    transform: rotate(-1deg);
    transform-origin: left center;
    transition: width .35s var(--ease-out);
    border-radius: 2px;
  }
  li.task.done .label {
    color: var(--ink-faint);
  }
  li.task.done .label::after {
    width: calc(100% + 4px);
  }
  /* retire the completed task — indent + lighten, like crossing it off and pushing it aside */
  li.task.done {
    padding-left: 28px;
    opacity: .65;
  }

  /* delete button */
  .delete {
    flex: none;
    appearance: none;
    border: 0;
    background: transparent;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--ink-faint);
    opacity: 0;
    transition: opacity .15s, color .15s, background .15s, transform .08s;
    display: grid;
    place-items: center;
    margin-top: -1px;
  }
  li.task:hover .delete,
  li.task:focus-within .delete { opacity: 1; }
  .delete:hover { color: var(--accent); background: var(--accent-soft); }
  .delete:active { transform: scale(.9); }
  .delete svg { width: 14px; height: 14px; }
  /* On touch devices hover doesn't exist — always show */
  @media (hover: none) {
    .delete { opacity: .6; }
  }

  /* === Empty state === */
  .empty {
    text-align: center;
    padding: var(--s-7) var(--s-4) var(--s-6);
    color: var(--ink-soft);
  }
  .empty .doodle {
    font-family: var(--display);
    font-size: 64px;
    line-height: 1;
    color: var(--accent);
    transform: rotate(-6deg);
    display: inline-block;
    margin-bottom: var(--s-3);
    opacity: .85;
  }
  .empty h2 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 28px;
    color: var(--ink);
    margin: 0 0 6px;
  }
  .empty p {
    margin: 0;
    font-size: 14.5px;
  }

  /* utility */
  .sr {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  /* focus rings */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .check:focus-visible {
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <main class="app" aria-label="Lista de tareas">
    <header id="header">
      <div class="title-row">
        <h1>Tareas<span class="dot">.</span></h1>
        <div class="counter" id="counter" aria-live="polite">0 tareas</div>
      </div>

      <form class="input-row" id="form" autocomplete="off">
        <label for="new-task" class="sr">Nueva tarea</label>
        <input
          id="new-task"
          type="text"
          placeholder="Escribe una tarea…"
          maxlength="200"
          autocomplete="off"
          autocapitalize="sentences"
        />
        <button class="add-btn" type="submit" id="add" disabled>Añadir</button>
      </form>

      <div class="filters" role="group" aria-label="Filtrar tareas">
        <button class="filter" data-filter="all"       aria-pressed="true">Todas</button>
        <button class="filter" data-filter="pending"   aria-pressed="false">Pendientes</button>
        <button class="filter" data-filter="completed" aria-pressed="false">Hechas</button>
      </div>
    </header>

    <div class="list-wrap">
      <ul class="tasks" id="list" aria-label="Tareas"></ul>
      <div class="empty" id="empty" hidden>
        <div class="doodle" aria-hidden="true">∅</div>
        <h2 id="empty-title">Tu libreta está vacía</h2>
        <p id="empty-sub">Escribe arriba para empezar. Pulsa <kbd>Enter</kbd> para añadir.</p>
      </div>
    </div>
  </main>

<script>
(() => {
  // ---------- state ----------
  const STORAGE_KEY = 'tareas.v1';
  /** @type {{id:string, text:string, done:boolean, createdAt:number}[]} */
  let tasks = load();
  let filter = 'all';

  // ---------- elements ----------
  const $form     = document.getElementById('form');
  const $input    = document.getElementById('new-task');
  const $add      = document.getElementById('add');
  const $list     = document.getElementById('list');
  const $counter  = document.getElementById('counter');
  const $empty    = document.getElementById('empty');
  const $emptyT   = document.getElementById('empty-title');
  const $emptyS   = document.getElementById('empty-sub');
  const $header   = document.getElementById('header');
  const $filters  = document.querySelectorAll('.filter');

  // ---------- storage ----------
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return [];
      return parsed.filter(t => t && typeof t.text === 'string');
    } catch { return []; }
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch {}
  }
  function uid() {
    return Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
  }

  // ---------- render ----------
  function visibleTasks() {
    if (filter === 'pending')   return tasks.filter(t => !t.done);
    if (filter === 'completed') return tasks.filter(t =>  t.done);
    return tasks;
  }

  function render(opts = {}) {
    const animateNewest = opts.animateNewest;
    const visible = visibleTasks();

    // counter — always reflects ALL tasks (not the filter)
    const total   = tasks.length;
    const pending = tasks.filter(t => !t.done).length;
    if (total === 0) {
      $counter.textContent = '0 tareas';
    } else if (pending === 0) {
      $counter.innerHTML = `<strong>${total}</strong> ${total === 1 ? 'tarea' : 'tareas'} · todas hechas`;
    } else {
      $counter.innerHTML = `<strong>${pending}</strong> de ${total} pendiente${pending === 1 ? '' : 's'}`;
    }

    // empty states
    if (total === 0) {
      $list.innerHTML = '';
      $empty.hidden = false;
      $emptyT.textContent = 'Tu libreta está vacía';
      $emptyS.innerHTML = 'Escribe arriba para empezar. Pulsa <kbd>Enter</kbd> para añadir.';
      return;
    }
    if (visible.length === 0) {
      $list.innerHTML = '';
      $empty.hidden = false;
      if (filter === 'pending') {
        $emptyT.textContent = '¡Todo hecho!';
        $emptyS.textContent = 'No tienes tareas pendientes.';
      } else if (filter === 'completed') {
        $emptyT.textContent = 'Nada terminado aún';
        $emptyS.textContent = 'Las tareas que completes aparecerán aquí.';
      }
      return;
    }
    $empty.hidden = true;

    // build list
    const frag = document.createDocumentFragment();
    visible.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task' + (t.done ? ' done' : '');
      li.dataset.id = t.id;
      // disable entry animation unless this is the newest one
      if (animateNewest !== t.id) li.style.animation = 'none';

      // checkbox
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'check';
      cb.checked = t.done;
      cb.setAttribute('aria-label', t.done ? 'Marcar como pendiente' : 'Marcar como completada');
      cb.addEventListener('change', () => toggle(t.id));

      // label
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = t.text;
      label.addEventListener('click', () => toggle(t.id));

      // delete
      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'delete';
      del.setAttribute('aria-label', 'Eliminar tarea');
      del.innerHTML = '<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
      del.addEventListener('click', () => remove(t.id, li));

      li.append(cb, label, del);
      frag.appendChild(li);
    });
    $list.innerHTML = '';
    $list.appendChild(frag);
  }

  // ---------- actions ----------
  function add(text) {
    text = text.trim();
    if (!text) return;
    const t = { id: uid(), text, done: false, createdAt: Date.now() };
    tasks.unshift(t); // newest on top
    save();
    render({ animateNewest: t.id });
  }

  function toggle(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    t.done = !t.done;
    save();
    render();
  }

  function remove(id, liEl) {
    // animate out, then remove from data
    const node = liEl || $list.querySelector(`li[data-id="${id}"]`);
    if (node) {
      node.classList.add('leaving');
      // lock current height so the slideOut animation can collapse it cleanly
      node.style.maxHeight = node.offsetHeight + 'px';
      node.addEventListener('animationend', () => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, { once: true });
    } else {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }
  }

  function setFilter(f) {
    filter = f;
    $filters.forEach(btn => {
      btn.setAttribute('aria-pressed', btn.dataset.filter === f ? 'true' : 'false');
    });
    render();
  }

  // ---------- events ----------
  $input.addEventListener('input', () => {
    $add.disabled = $input.value.trim().length === 0;
  });

  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      $input.value = '';
      $add.disabled = true;
    }
  });

  $form.addEventListener('submit', (e) => {
    e.preventDefault();
    const v = $input.value;
    if (!v.trim()) return;
    add(v);
    $input.value = '';
    $add.disabled = true;
    $input.focus();
  });

  $filters.forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.filter));
  });

  // sticky header shadow when scrolled
  const sentinel = document.createElement('div');
  sentinel.style.cssText = 'position:absolute;top:0;height:1px;width:1px;';
  $header.parentNode.insertBefore(sentinel, $header);
  const io = new IntersectionObserver(([e]) => {
    $header.classList.toggle('is-stuck', !e.isIntersecting);
  }, { threshold: [1] });
  io.observe(sentinel);

  // ---------- init ----------
  render();
  $input.focus();
})();
</script>
</body>
</html>
