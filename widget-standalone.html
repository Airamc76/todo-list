<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Acceso rápido</title>
<style>
/* ── CSS tokens ──────────────────────────────────────────── */
:root {
  --accent:       #D85A30;
  --accent-hover: #c14d27;
  --accent-soft:  #d85a3018;
  --bg:        #faf7f2;
  --surface:   #ffffff;
  --surface-2: #f4efe6;
  --border:    #ece6db;
  --border-strong: #ddd4c4;
  --text:      #1f1b16;
  --text-soft: #6e6557;
  --text-faint:#a59c8c;
  --red:    #dc2626;
  --amber:  #f59e0b;
  --green:  #10b981;
  --ease: cubic-bezier(.22,.61,.36,1);
  --r-sm: 6px;
}
[data-theme="dark"] {
  --bg:        #15120e;
  --surface:   #1d1a14;
  --surface-2: #25211a;
  --border:    #2e2a22;
  --border-strong: #3a352b;
  --text:      #f4ede0;
  --text-soft: #b4a994;
  --text-faint:#7a7165;
  --accent-soft: #d85a3022;
}

/* ── Reset ────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; }
html,body { margin:0; padding:0; height:100%; overflow:hidden; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}
button { font: inherit; color: inherit; cursor: pointer; }
input  { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

/* ── Shell ────────────────────────────────────────────────── */
.shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
  box-shadow: 0 8px 32px -8px rgba(0,0,0,.22), 0 2px 8px rgba(0,0,0,.1);
}

/* ── Title bar (draggable) ───────────────────────────────── */
.titlebar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 8px 0 12px;
  height: 36px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
  flex: none;
}
.titlebar-icon {
  width: 14px; height: 14px;
  border-radius: 4px;
  background: var(--accent);
  display: grid; place-items: center;
  flex: none;
  -webkit-app-region: no-drag;
}
.titlebar-icon svg { width: 9px; height: 9px; }
.titlebar-title {
  flex: 1;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
  pointer-events: none;
}
.tb-btn {
  -webkit-app-region: no-drag;
  appearance: none; border: 0; background: transparent;
  width: 24px; height: 24px;
  border-radius: 5px;
  display: grid; place-items: center;
  color: var(--text-faint);
  transition: background .1s, color .1s;
  flex: none;
}
.tb-btn:hover { background: var(--border); color: var(--text); }
.tb-btn.close:hover { background: var(--accent-soft); color: var(--accent); }
.tb-btn svg { width: 11px; height: 11px; pointer-events: none; }

/* ── Tabs ─────────────────────────────────────────────────── */
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-bottom: 1px solid var(--border);
  flex: none;
  background: var(--surface);
}
.tab {
  appearance: none; border: 0; background: transparent;
  padding: 9px 4px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-faint);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .12s, border-color .12s;
}
.tab:hover { color: var(--text); }
.tab[aria-pressed="true"] { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Pane ─────────────────────────────────────────────────── */
.panes { flex: 1; overflow: hidden; min-height: 0; display: flex; flex-direction: column; }
.pane {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px 14px;
  display: none;
  flex-direction: column;
  gap: 0;
}
.pane.active { display: flex; }
.pane::-webkit-scrollbar { width: 5px; }
.pane::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }

/* ── Sencillas pane ──────────────────────────────────────── */
.w-input {
  width: 100%; border: 0;
  border-bottom: 1px solid var(--border);
  background: transparent;
  padding: 7px 2px;
  font-size: 13px;
  outline: 0;
  margin-bottom: 8px;
  flex: none;
  user-select: text;
}
.w-input:focus { border-bottom-color: var(--accent); }
.w-input::placeholder { color: var(--text-faint); font-style: italic; }

.w-list { list-style: none; margin: 0; padding: 0; }
.w-li {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 2px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  transition: background .1s;
  border-radius: 3px;
}
.w-li:last-child { border-bottom: 0; }
.w-li:hover { background: var(--accent-soft); }
.w-li.done { opacity: .5; }
.w-li.done .w-text { text-decoration: line-through; color: var(--text-faint); }

.w-check {
  appearance: none;
  width: 14px; height: 14px;
  border: 1.5px solid var(--border-strong);
  border-radius: 3px;
  cursor: pointer; flex: none;
  position: relative;
  transition: all .15s;
  user-select: none;
}
.w-check:checked { background: var(--accent); border-color: var(--accent); }
.w-check:checked::after {
  content: ""; position: absolute;
  left: 2px; top: 4px;
  width: 6px; height: 3px;
  border-left: 2px solid #fff; border-bottom: 2px solid #fff;
  transform: rotate(-45deg);
}
.w-text { flex: 1; word-break: break-word; cursor: pointer; }
.w-del {
  appearance: none; border: 0; background: transparent;
  color: var(--text-faint);
  width: 20px; height: 20px;
  opacity: 0;
  border-radius: 4px;
  display: grid; place-items: center;
  transition: opacity .12s, color .12s;
  flex: none;
}
.w-li:hover .w-del { opacity: 1; }
.w-del:hover { color: var(--accent); }
.w-del svg { width: 10px; height: 10px; }

.w-empty {
  margin: auto;
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
  font-style: italic;
  padding: 24px 0;
}

/* ── Apuntes pane ─────────────────────────────────────────── */
.w-apunte { display: flex; align-items: center; gap: 8px; padding: 3px 2px; }
.w-apunte-check {
  appearance: none;
  width: 13px; height: 13px;
  border: 1.5px solid var(--border-strong);
  border-radius: 50%;
  cursor: pointer; flex: none;
  position: relative; transition: all .15s;
  user-select: none;
}
.w-apunte-check:checked { background: var(--accent); border-color: var(--accent); }
.w-apunte-input {
  flex: 1; border: 0; background: transparent; outline: 0;
  font-size: 13px; padding: 3px 0; line-height: 1.5;
  color: var(--text); user-select: text;
}
.w-apunte.done .w-apunte-input { text-decoration: line-through; color: var(--text-faint); }
.w-apunte-input::placeholder { color: var(--text-faint); }

/* ── Recordatorios pane ──────────────────────────────────── */
.w-rem {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 4px; border-bottom: 1px solid var(--border);
}
.w-rem:last-child { border-bottom: 0; }
.w-rem-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border-strong); margin-top: 5px; flex: none;
}
.w-rem.due .w-rem-dot { background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}
.w-rem-body { flex: 1; min-width: 0; }
.w-rem-title { font-size: 12.5px; font-weight: 500; line-height: 1.4; }
.w-rem-meta { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
.w-rem.due .w-rem-meta { color: var(--accent); font-weight: 600; }

/* ── Footer ───────────────────────────────────────────────── */
.footer {
  border-top: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex: none;
  background: var(--surface-2);
}
.footer-btn {
  appearance: none; border: 0; background: transparent;
  font-size: 11px; color: var(--text-faint);
  padding: 3px 6px; border-radius: 4px;
  transition: background .1s, color .1s;
}
.footer-btn:hover { background: var(--border); color: var(--text); }
.footer-spacer { flex: 1; }
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); opacity: 0;
  transition: opacity .3s;
}
.sync-dot.active { opacity: 1; }
</style>
</head>
<body data-theme="light">
<div class="shell">

  <!-- Title bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-icon">
      <svg viewBox="0 0 100 100" fill="none">
        <path d="M22 54L42 74L80 28" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="titlebar-title">Acceso rápido</span>
    <button class="tb-btn" id="btn-app" title="Abrir app completa">
      <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
    <button class="tb-btn close" id="btn-close" title="Cerrar widget">
      <svg viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab" data-tab="sencillas" aria-pressed="true">Sencillas</button>
    <button class="tab" data-tab="apuntes"   aria-pressed="false">Apuntes</button>
    <button class="tab" data-tab="avisos"    aria-pressed="false">Avisos</button>
  </div>

  <!-- Panes -->
  <div class="panes">

    <!-- Sencillas -->
    <div class="pane active" id="pane-sencillas">
      <input class="w-input" id="w-senc-input" type="text" placeholder="Escribe y pulsa Enter…" autocomplete="off"/>
      <ul class="w-list" id="w-senc-list"></ul>
      <div class="w-empty" id="w-senc-empty">Sin tareas. Escribe arriba.</div>
    </div>

    <!-- Apuntes -->
    <div class="pane" id="pane-apuntes">
      <div id="w-notepad"></div>
    </div>

    <!-- Avisos / Recordatorios -->
    <div class="pane" id="pane-avisos">
      <div id="w-rem-list"></div>
      <div class="w-empty" id="w-rem-empty" hidden>Sin recordatorios pendientes.</div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="sync-dot" id="sync-dot" title="Sincronizado"></span>
    <button class="footer-btn" id="btn-clear-done">Limpiar hechas</button>
    <span class="footer-spacer"></span>
    <button class="footer-btn" id="btn-theme">Tema</button>
  </div>
</div>

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────
const STORE_KEY = 'tareas.app.v2';
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);

// ── State ─────────────────────────────────────────────────────────
function defaultState() {
  return {
    sencillas: [],
    apuntes: [],
    reminders: [],
    settings: { theme: 'light' }
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return defaultState();
    const p = JSON.parse(raw);
    const d = defaultState();
    return { ...d, ...p, settings: { ...d.settings, ...(p.settings || {}) } };
  } catch { return defaultState(); }
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch {}
  window.electronAPI?.notifyChange();
  flashSync();
}

let state = load();

// ── Theme ─────────────────────────────────────────────────────────
function applyTheme() {
  const t = state.settings?.theme || 'light';
  document.body.dataset.theme = t;
}
applyTheme();

// ── Sync indicator ────────────────────────────────────────────────
let syncTimer;
function flashSync() {
  const dot = document.getElementById('sync-dot');
  dot.classList.add('active');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => dot.classList.remove('active'), 800);
}

// ── Tabs ──────────────────────────────────────────────────────────
let activeTab = 'sencillas';

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-pressed', b === btn));
    document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + activeTab));
    renderActive();
  });
});

function renderActive() {
  if (activeTab === 'sencillas') renderSencillas();
  if (activeTab === 'apuntes')   renderApuntes();
  if (activeTab === 'avisos')    renderReminders();
}

// ── Sencillas ─────────────────────────────────────────────────────
function renderSencillas() {
  const list  = document.getElementById('w-senc-list');
  const empty = document.getElementById('w-senc-empty');
  list.innerHTML = '';

  const sorted = [...(state.sencillas || [])].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return (a.order || 0) - (b.order || 0);
  });

  sorted.forEach(t => {
    const li = document.createElement('li');
    li.className = 'w-li' + (t.done ? ' done' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'w-check'; cb.checked = t.done;
    cb.addEventListener('change', () => {
      t.done = cb.checked;
      save(); renderSencillas();
    });

    const tx = document.createElement('span');
    tx.className = 'w-text'; tx.textContent = t.text;
    tx.addEventListener('click', () => { t.done = !t.done; save(); renderSencillas(); });

    const del = document.createElement('button');
    del.className = 'w-del'; del.setAttribute('aria-label', 'Eliminar');
    del.innerHTML = '<svg viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';
    del.addEventListener('click', () => {
      state.sencillas = state.sencillas.filter(x => x.id !== t.id);
      save(); renderSencillas();
    });

    li.append(cb, tx, del);
    list.appendChild(li);
  });

  empty.hidden = sorted.length > 0;
}

const sencInput = document.getElementById('w-senc-input');
sencInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const v = sencInput.value.trim();
    if (!v) return;
    if (!state.sencillas) state.sencillas = [];
    const maxO = state.sencillas.filter(x => !x.done).reduce((m, x) => Math.max(m, x.order || 0), -1);
    state.sencillas.push({ id: uid(), text: v, done: false, order: maxO + 1 });
    sencInput.value = '';
    save(); renderSencillas();
  }
});

document.getElementById('btn-clear-done').addEventListener('click', () => {
  if (!state.sencillas) return;
  state.sencillas = state.sencillas.filter(x => !x.done);
  save(); renderSencillas();
});

// ── Apuntes ───────────────────────────────────────────────────────
function renderApuntes() {
  if (!state.apuntes) state.apuntes = [];
  if (state.apuntes.length === 0 || state.apuntes[state.apuntes.length - 1].text.trim() !== '') {
    state.apuntes.push({ id: uid(), text: '', done: false });
  }

  const pad = document.getElementById('w-notepad');
  pad.innerHTML = '';

  state.apuntes.forEach((a, i) => {
    const row = document.createElement('div');
    row.className = 'w-apunte' + (a.done ? ' done' : '');
    row.dataset.id = a.id;

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'w-apunte-check'; cb.checked = a.done;
    cb.addEventListener('change', () => {
      a.done = cb.checked; save();
      row.classList.toggle('done', a.done);
    });

    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'w-apunte-input';
    inp.placeholder = i === 0 ? 'Apunta algo…' : '';
    inp.value = a.text;
    inp.addEventListener('input', () => { a.text = inp.value; save(); });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const idx = state.apuntes.findIndex(x => x.id === a.id);
        state.apuntes.splice(idx + 1, 0, { id: uid(), text: '', done: false });
        save(); renderApuntes();
        setTimeout(() => {
          const next = pad.children[idx + 1];
          if (next) next.querySelector('.w-apunte-input').focus();
        }, 0);
      } else if (e.key === 'Backspace' && inp.value === '' && state.apuntes.length > 1) {
        const idx = state.apuntes.findIndex(x => x.id === a.id);
        e.preventDefault();
        state.apuntes.splice(idx, 1);
        save(); renderApuntes();
        setTimeout(() => {
          const prev = pad.children[Math.max(0, idx - 1)];
          if (prev) {
            const p = prev.querySelector('.w-apunte-input');
            p.focus(); p.setSelectionRange(p.value.length, p.value.length);
          }
        }, 0);
      }
    });

    row.append(cb, inp);
    pad.appendChild(row);
  });
}

// ── Recordatorios ─────────────────────────────────────────────────
function activeRemTime(r) {
  return new Date(r.snoozedUntil || r.when).getTime();
}

function timeUntil(ms) {
  const diff = ms - Date.now();
  if (diff <= 0) return '¡Vence ahora!';
  const m = Math.round(diff / 60000);
  if (m < 60) return `En ${m} min`;
  const h = Math.round(m / 60);
  if (h < 24) return `En ${h}h`;
  return `En ${Math.round(h / 24)} días`;
}

function renderReminders() {
  const wrap  = document.getElementById('w-rem-list');
  const empty = document.getElementById('w-rem-empty');
  wrap.innerHTML = '';

  const now = Date.now();
  const upcoming = (state.reminders || [])
    .filter(r => !r.done)
    .sort((a, b) => activeRemTime(a) - activeRemTime(b))
    .slice(0, 8);

  upcoming.forEach(r => {
    const el  = document.createElement('div');
    const t   = activeRemTime(r);
    const due = t <= now;
    el.className = 'w-rem' + (due ? ' due' : '');

    const dot   = document.createElement('span'); dot.className = 'w-rem-dot';
    const body  = document.createElement('div');  body.className = 'w-rem-body';
    const title = document.createElement('div');  title.className = 'w-rem-title';
    title.textContent = r.text;
    const meta = document.createElement('div'); meta.className = 'w-rem-meta';
    meta.textContent = due ? '¡Vence ahora!' : timeUntil(t);

    body.append(title, meta);
    el.append(dot, body);
    wrap.appendChild(el);
  });

  empty.hidden = upcoming.length > 0;
}

// ── Cross-window sync via IPC (Electron) ─────────────────────────
if (window.electronAPI) {
  window.electronAPI.onDataChanged(() => {
    state = load();
    applyTheme();
    renderActive();
    flashSync();
  });
}

// Fallback: storage event (works in browser, may also fire in some Electron configs)
window.addEventListener('storage', e => {
  if (e.key === STORE_KEY) {
    state = load();
    applyTheme();
    renderActive();
    flashSync();
  }
});

// ── Theme toggle ──────────────────────────────────────────────────
document.getElementById('btn-theme').addEventListener('click', () => {
  if (!state.settings) state.settings = {};
  state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  save();
});

// ── Title bar buttons ─────────────────────────────────────────────
document.getElementById('btn-close').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.closeWidget();
});
document.getElementById('btn-app').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.showMainApp();
});

// ── Reminder ticker ───────────────────────────────────────────────
setInterval(() => {
  if (activeTab === 'avisos') renderReminders();
}, 20000);

// ── Init ──────────────────────────────────────────────────────────
renderSencillas();
</script>
</body>
</html>
